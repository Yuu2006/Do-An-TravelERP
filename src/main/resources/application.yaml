spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: digital-travel-erp
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@//${DB_HOST}:${DB_PORT}/${DB_SERVICE}}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      validation-timeout: 5000
      connection-test-query: SELECT 1 FROM DUAL
      data-source-properties:
        useUnicode: true
        characterEncoding: UTF-8
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        format_sql: true
        connection:
          characterEncoding: utf-8
          useUnicode: true
  sql:
    init:
      mode: never
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

server:
  address: 0.0.0.0
  port: ${SERVER_PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  level:
    org.hibernate.SQL: info
    com.zaxxer.hikari: info
    org.springframework.security: DEBUG

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}
  payment:
    mock-enabled: ${PAYMENT_MOCK_ENABLED:false}
  powerbi:
    db-host: ${POWERBI_DB_HOST:${DB_HOST:localhost}}
    db-port: ${POWERBI_DB_PORT:${DB_PORT:1521}}
    db-service: ${POWERBI_DB_SERVICE:${DB_SERVICE:orcl}}
    db-schema: ${POWERBI_DB_SCHEMA:${DB_USERNAME:TRAVEL}}
    db-username: ${POWERBI_READONLY_USER:READONLY}   # tài khoản read-only cố định
    db-password: ${POWERBI_READONLY_PASS:readpass}   # mật khẩu tương ứng
    temp-user-ttl-seconds: 28800

