spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: digital-travel-erp
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@localhost:1521/orcl}
    username: ${DB_USERNAME:backend}
    password: ${DB_PASSWORD:abcd}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      validation-timeout: 5000
      connection-test-query: SELECT 1 FROM DUAL
      data-source-properties:
        useUnicode: true
        characterEncoding: UTF-8
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        format_sql: true
        connection:
          characterEncoding: utf-8
          useUnicode: true
  sql:
    init:
      mode: never
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

server:
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  level:
    org.hibernate.SQL: info
    com.zaxxer.hikari: info
    org.springframework.security: DEBUG

app:
  jwt:
    secret: ${JWT_SECRET:ZGlnaXRhbC10cmF2ZWwtZXJwLXNlY3JldC1rZXktbXVzdC1iZS00Mi1jaGFycy1sb25nLW1pbg==}
    expiration: ${JWT_EXPIRATION:86400000}



