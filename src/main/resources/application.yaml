spring:
  application:
    name: digital-travel-erp
  datasource:
    url: ${DB_URL:jdbc:oracle:thin:@//${DB_HOST:localhost}:${DB_PORT:1521}/${DB_SERVICE:pdb}}
    username: ${DB_USERNAME:ERP_APP}
    password: ${DB_PASSWORD:ERP123}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      validation-timeout: 5000
      connection-test-query: SELECT 1 FROM DUAL
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never

logging:
  level:
    org.hibernate.SQL: info
    com.zaxxer.hikari: info
