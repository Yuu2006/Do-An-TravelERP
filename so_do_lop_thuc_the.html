<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sơ đồ lớp thực thể - Digital Travel ERP</title>
  <style>
    :root {
      --ink: #000000;
      --muted: #000000;
      --line: #000000;
      --panel: #ffffff;
      --header: #ffffff;
      --accent: #000000;
      --canvas: #ffffff;
      --grid: #ffffff;
      --shadow: transparent;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background: var(--canvas);
      overflow: hidden;
    }
    header {
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 8px 16px;
      background: #fff;
      border-bottom: 1px solid #000;
      position: relative;
      z-index: 20;
    }
    .title h1 { font-size: 17px; margin: 0 0 2px; font-weight: 650; }
    .title p { font-size: 11px; color: var(--muted); margin: 0; }
    .toolbar { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
    .toolbar button, .toolbar label, .toolbar select {
      height: 34px;
      border: 1px solid #000;
      background: #fff;
      color: var(--ink);
      border-radius: 6px;
      padding: 0 11px;
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .toolbar select { padding: 0 8px; }
    .toolbar button:hover, .toolbar label:hover { text-decoration: underline; }
    .toolbar input[type="checkbox"] { accent-color: var(--accent); }
    .zoom { min-width: 53px; color: var(--muted); text-align: center; font-size: 12px; }
    #viewport {
      height: calc(100vh - 62px);
      width: 100%;
      overflow: hidden;
      position: relative;
      cursor: grab;
      background:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    #viewport.panning { cursor: grabbing; }
    #diagram {
      position: absolute;
      transform-origin: 0 0;
      width: 6900px;
      height: 3300px;
    }
    #relationships {
      position: absolute;
      inset: 0;
      width: 6900px;
      height: 3300px;
      pointer-events: none;
      overflow: visible;
    }
    .rel-line {
      stroke: var(--line);
      stroke-width: 1.3;
      fill: none;
      vector-effect: non-scaling-stroke;
    }
    .rel-label, .mult-label {
      font-size: 12px;
      fill: #000;
      paint-order: stroke;
      stroke: #fff;
      stroke-width: 3px;
      stroke-linejoin: round;
    }
    .rel-label { font-size: 11px; fill: #000; }
    .class-box {
      position: absolute;
      width: 520px;
      background: var(--panel);
      border: 1px solid #000;
      box-shadow: 0 2px 9px var(--shadow);
      font-size: 12px;
      cursor: move;
      user-select: none;
      z-index: 2;
    }
    .class-box:hover, .class-box.active {
      z-index: 5;
      border-width: 2px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .16);
    }
    .class-title {
      min-height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 8px;
      background: var(--header);
      border-bottom: 1px solid #000;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .15px;
      text-align: center;
    }
    .class-box.highlight .class-title { text-decoration: underline; color: #000; }
    .class-box.hidden { display: none; }
    .segment {
      border-bottom: 1px solid #000;
      padding: 5px 7px 5px 10px;
      line-height: 1.55;
    }
    .segment:last-child { border-bottom: 0; }
    .segment div { white-space: normal; overflow-wrap: anywhere; }
    .field::before { content: "- "; color: var(--muted); }
    .method::before { content: "+ "; color: var(--accent); font-weight: 700; }
    .methods-hidden .methods { display: none; }
    .legend {
      position: fixed;
      bottom: 14px;
      left: 16px;
      z-index: 30;
      background: rgba(255, 255, 255, .95);
      border: 1px solid #000;
      box-shadow: 0 2px 8px var(--shadow);
      padding: 8px 11px;
      border-radius: 7px;
      font-size: 11px;
      color: var(--muted);
    }
    .legend strong { color: var(--ink); }
    .legend span { display: inline-block; width: 26px; border-top: 1px solid var(--line); margin: 0 5px 3px 10px; }
    .counter {
      position: fixed;
      right: 15px;
      bottom: 15px;
      z-index: 30;
      padding: 7px 10px;
      border: 1px solid #000;
      border-radius: 7px;
      background: rgba(255,255,255,.94);
      font-size: 11px;
      color: var(--muted);
    }
    @media print {
      header, .legend, .counter { display: none; }
      body, #viewport { overflow: visible; height: auto; background: #fff; }
      #diagram { position: relative; transform: none !important; }
      .class-box { box-shadow: none; }
    }
  </style>
</head>

  </header>
  <main id="viewport">

        </defs>
      </svg>
    </div>
  </main>

        const [from, to, fm, tm, label] = plan.rel;
        const exterior1 = outside(plan.p1), exterior2 = outside(plan.p2);
        const middle = findRoute(exterior1, exterior2, blocked, occupied);
        const points = simplify([plan.p1, ...middle, plan.p2]);
        const line = node('path', { d:pathText(points), class:'drawn rel-line association', 'data-link':from + '-' + to });
        svg.appendChild(line);
        const firstLabel = multPosition(plan.p1), secondLabel = multPosition(plan.p2);
        svg.appendChild(node('text', { x:firstLabel.x, y:firstLabel.y, class:'drawn mult-label' }, fm));
        svg.appendChild(node('text', { x:secondLabel.x, y:secondLabel.y, class:'drawn mult-label' }, tm));
        const center = points[Math.floor(points.length / 2)];
        if (showLabels) svg.appendChild(node('text', { x:center.x + 7, y:center.y - 7, class:'drawn rel-label' }, label));
      });
    }
    function transform() {
      diagram.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
      document.getElementById('zoomValue').textContent = Math.round(scale * 100) + '%';
    }
    function setScale(next) {
      scale = Math.min(1.45, Math.max(.22, next));
      transform();
    }
    function fit() {
      const padding = 30;
      const activeBounds = classes.filter(c => activeIds.has(c.id)).map(c => bounds(c.id));
      const minX = Math.min(...activeBounds.map(b => b.x)) - 50;
      const minY = Math.min(...activeBounds.map(b => b.y)) - 50;
      const maxX = Math.max(...activeBounds.map(b => b.x + b.w)) + 50;
      const maxY = Math.max(...activeBounds.map(b => b.y + b.h)) + 50;
      const width = maxX - minX, height = maxY - minY;
      const sx = (viewport.clientWidth - padding * 2) / width;
      const sy = (viewport.clientHeight - padding * 2) / height;
      scale = Math.min(sx, sy, 1);
      panX = (viewport.clientWidth - width * scale) / 2 - minX * scale;
      panY = (viewport.clientHeight - height * scale) / 2 - minY * scale;
      transform();
    }
    function applyView(viewName) {
      activeView = views[viewName];
      activeIds = new Set(activeView.ids);
      activeRelations = relations.filter(rel => activeIds.has(rel[0]) && activeIds.has(rel[1]));
      classes.forEach(c => {
        const el = document.getElementById('class-' + c.id);
        const visible = activeIds.has(c.id);
        el.classList.toggle('hidden', !visible);
        if (visible) {
          const position = activeView.layout[c.id];
          el.style.left = position[0] + 'px';
          el.style.top = position[1] + 'px';
        }
      });
      document.getElementById('counter').textContent =
        activeView.ids.length + ' thực thể | ' + activeRelations.length + ' liên kết | ' + activeView.title;
      drawRelations();
      fit();
    }
    function reset() {
      classes.filter(c => activeIds.has(c.id)).forEach(c => {
        const el = document.getElementById('class-' + c.id);
        const position = activeView.layout[c.id];
        el.style.left = position[0] + 'px';
        el.style.top = position[1] + 'px';
      });
      drawRelations();
      fit();
    }
    function startDrag(e) {
      if (e.button !== 0) return;
      e.stopPropagation();
      const el = e.currentTarget;
      drag = { el, x: e.clientX, y: e.clientY, left: el.offsetLeft, top: el.offsetTop };
      el.classList.add('active');
    }
    function highlight(id) {
      document.querySelectorAll('.class-box').forEach(box => box.classList.toggle('highlight', box.dataset.id === id));
    }
    viewport.addEventListener('mousedown', e => {
      if (e.button !== 0 || e.target.closest('.class-box')) return;
      pan = { x:e.clientX, y:e.clientY, left:panX, top:panY };
      viewport.classList.add('panning');
    });
    window.addEventListener('mousemove', e => {
      if (drag) {
        drag.el.style.left = (drag.left + (e.clientX - drag.x) / scale) + 'px';
        drag.el.style.top = (drag.top + (e.clientY - drag.y) / scale) + 'px';
        drawRelations();
      } else if (pan) {
        panX = pan.left + e.clientX - pan.x;
        panY = pan.top + e.clientY - pan.y;
        transform();
      }
    });
    window.addEventListener('mouseup', () => {
      if (drag) drag.el.classList.remove('active');
      drag = null;
      pan = null;
      viewport.classList.remove('panning');
    });
    viewport.addEventListener('wheel', e => {
      if (!e.ctrlKey) return;
      e.preventDefault();
      setScale(scale + (e.deltaY < 0 ? .05 : -.05));
    }, { passive:false });
    document.getElementById('zoomIn').addEventListener('click', () => setScale(scale + .08));
    document.getElementById('zoomOut').addEventListener('click', () => setScale(scale - .08));
    document.getElementById('fit').addEventListener('click', fit);
    document.getElementById('reset').addEventListener('click', reset);
    document.getElementById('viewSelector').addEventListener('change', e => applyView(e.target.value));
    document.getElementById('toggleLabels').addEventListener('change', e => {
      showLabels = e.target.checked;
      drawRelations();
    });
    document.getElementById('toggleMethods').addEventListener('change', e => {
      diagram.classList.toggle('methods-hidden', !e.target.checked);
      drawRelations();
      fit();
    });
    renderClasses();
    const requestedView = new URLSearchParams(window.location.search).get('view');
    const initialView = views[requestedView] ? requestedView : 'tongThe';
    document.getElementById('viewSelector').value = initialView;
    applyView(initialView);
    window.addEventListener('resize', fit);
  </script>
</body>
</html>
